settings:
  namespace_roots:
    code/src: App
    code/tests: Tests
  source_extension: ".php"
  test_suffix: "Test"
  test_extension: ".php"
  namespace_separator: "\\"

coverage_xml: coverage-xml
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "PHPUnit sample"
    paths:
      source: "code/src"
      test: "code/tests"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
